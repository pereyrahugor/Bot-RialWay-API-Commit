<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Backoffice - {{BOT_NAME}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style/crm-common.css">
    <link rel="stylesheet" href="/style/login.css">
</head>
<body data-theme="light">
    <script src="/js/crm-common.js"></script>
    <div class="login-card">
        <h1>{{BOT_NAME}} Bot</h1>
        <p>Introduce tu token de acceso</p>
        <input type="password" id="token" placeholder="Token de seguridad" autofocus>
        <button onclick="login()">Entrar al Backoffice</button>
        <div id="error" class="error">Token inválido. Inténtalo de nuevo.</div>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>
