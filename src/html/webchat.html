<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/js/auth-check.js"></script>
    <meta charset="UTF-8">
    <title>Web Chat Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/style/crm-common.css">
    <link rel="stylesheet" href="style/style.css" />
</head>
<body data-theme="light">
    <!-- Navbar -->
    <div id="navbar">
        <div class="nav-item" title="Conversaciones" onclick="window.location.href='/backoffice'"><i class="fas fa-comment-dots"></i></div>
        <div class="nav-item" title="Dashboard" onclick="window.location.href='/dashboard'"><i class="fas fa-th-large"></i></div>
        <div class="nav-item" title="Variables" onclick="window.location.href='/variables'"><i class="fas fa-code"></i></div>
        <div class="nav-item active" title="Webchat" onclick="window.location.href='/webchat'"><i class="fas fa-desktop"></i></div>
        <div class="nav-item" id="theme-toggle" title="Cambiar Tema"><i class="fas fa-moon"></i></div>
        <div style="flex:1"></div>
        <div class="nav-item" onclick="logout()" title="Cerrar Sesión" style="color:#f87171;"><i class="fas fa-sign-out-alt"></i></div>
    </div>

    <div class="crm-main-container">
    <div id="container">
        <div id="header">
            <img id="avatar"
                src="https://img.freepik.com/vector-gratis/robot-vectorial-graident-ai_78370-4114.jpg?semt=ais_hybrid&w=740&q=80"
                alt="Bot" /> <!-- Cambiar imagen -->
            <div class="meta">
                <div class="name">Asistente demo</div>
                <div class="sub">en línea</div>
            </div>
        </div>
        <div id="chat"></div>
        <div id="inputRow">
            <div class="inputWrapper">
                <button id="attach">+</button>
                <textarea id="input" autocomplete="off" placeholder="Escribe un mensaje..."></textarea>
            </div>

            <button id="send"></button>

            <input type="file" id="fileInput" hidden accept="image/*,video/*,audio/*,.pdf,.doc,.docx" />
        </div>
    </div>
    </div>
    <script src="/js/crm-common.js"></script>
    <script src="js/main.js?v=2.1"></script>
</body>
</html>
